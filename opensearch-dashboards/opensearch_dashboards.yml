---
server.name: opensearch-dashboards
server.host: "0.0.0.0"
opensearch.hosts: ["https://opensearch:9200"]
opensearch.ssl.verificationMode: none
opensearch.requestHeadersWhitelist: ["securitytenant","Authorization"]

# OpenSearch credentials
opensearch.username: "admin"
opensearch.password: "MyStr0ng!P@ssw0rd2024"

data_source.enabled: true
workspace.enabled: true
explore.enabled: true

uiSettings:
  overrides:
    "home:useNewHomePage": true

chat:
  enabled: true
  forwardCredentials: true
  agUiUrl: "http://opensearch-agent-server:8001/runs"
#  fileUploadEnabled: true
  
contextProvider:
  enabled: true

# Login page customization (Security plugin basic auth)
opensearch_security.ui.basicauth.login.title: "Chorus OpenSearch Edition"
opensearch_security.ui.basicauth.login.subtitle: "Sign in as either 'rumi', 'pete', or 'admin', with the password MyStr0ng!P@ssw0rd2024"
opensearch_security.ui.basicauth.login.showbrandimage: true
opensearch_security.ui.basicauth.login.brandimage: "/ui/chorus-logo.png"
opensearch_security.ui.basicauth.login.buttonstyle: ""

# Full-page branding (nav, favicon, loading screen)
# Assets have transparent backgrounds, so they work on both light and dark themes
# — darkModeUrl is omitted and falls back to defaultUrl per OSD docs.
opensearchDashboards.branding:
  applicationTitle: "Chorus OpenSearch Edition"
  logo:
    defaultUrl: "/ui/chorus-logo.png"
  # `mark` (collapsed-nav square) intentionally omitted — the only swirl-only
  # asset available is a 16x16 .ico that's too small to upscale cleanly. The
  # OpenSearch default mark is used until a higher-res swirl is provided.
  loadingLogo:
    defaultUrl: "/ui/chorus-logo.png"
  faviconUrl: "/ui/chorus-favicon.ico"
